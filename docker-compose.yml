version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vecto_proxy"
      - "--providers.http.endpoint=http://web:8000/api/traefik-config/?token=${TRAEFIK_API_TOKEN}"
      - "--providers.http.pollInterval=15s"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy
      - internal
    restart: unless-stopped

  db:
    image: postgres:15
    command: postgres -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # --- NEW: PgBouncer Service ---
  pgbouncer:
    image: edoburu/pgbouncer:latest
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=5000
      - DEFAULT_POOL_SIZE=20
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             hypercorn config.asgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vecto.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.vecto.entrypoints=websecure"
      - "traefik.http.routers.vecto.tls.certresolver=letsencrypt"
      - "traefik.http.services.vecto.loadbalancer.server.port=8000"
    networks:
      - proxy
      - internal
    restart: unless-stopped

  celery:
    build: .
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

vecto-bot:
    build: .
    command: python manage.py run_discord_bot
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file: .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  proxy:
    name: vecto_proxy
  internal:

volumes:
  postgres_data:
  media_data:
  redis_data:
  letsencrypt: