{% comment %}
show_append is a "load more" window (show_page > 1): return just the next slice
of rows, which the button swaps in over itself inside the live #showsAccordion.
Everything below it — filters, the cross-publish <template>, the Add Show modal —
is the tab's one-time chrome and must not be re-sent per window.
{% endcomment %}
{% if show_append %}{% include 'pod_manager/creator_tabs/_show_rows.html' %}{% else %}
                <div class="card shadow-sm mb-4 border-secondary bg-dark">
                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="fw-bold mb-0">Podcasts in {{ current_network.name }}</h4>
                            <div>
                                {% comment %}
                                No "Import All" here: it dated from early feed
                                testing, and a bulk import belongs on the CLI
                                (manage.py ingest_feed <podcast_id>), not behind a
                                button that fires N concurrent imports from a
                                browser tab. Per-show "Run Live Import" stays.
                                {% endcomment %}
                                <button type="button" class="btn btn-warning btn-sm fw-bold" data-bs-toggle="modal" data-bs-target="#addShowModal">
                                    <i class="bi bi-plus-lg"></i> Add New Show
                                </button>
                            </div>
                        </div>

                        <form id="manage-podcasts-form" class="row gx-2 mb-4 bg-black p-3 rounded border border-secondary mx-0">
                            <input type="hidden" name="network" value="{{ current_network.slug }}">
                            
                            <div class="col-md-5 mb-2 mb-md-0">
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-search"></i></span>
                                    <input type="text" name="show_q" value="{{ show_q }}" class="form-control bg-dark text-light border-secondary" placeholder="Search Podcasts..." oninput="applyLiveFilter()">
                                </div>
                            </div>

                            <div class="col-md-3 mb-2 mb-md-0">
                                <select name="show_sort" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="applyLiveFilter()">
                                    <option value="alpha" {% if show_sort == 'alpha' %}selected{% endif %}>A-Z (Default)</option>
                                    <option value="recent" {% if show_sort == 'recent' %}selected{% endif %}>Recently Updated</option>
                                    <option value="oldest" {% if show_sort == 'oldest' %}selected{% endif %}>Stale (Oldest First)</option>
                                    <option value="count_desc" {% if show_sort == 'count_desc' %}selected{% endif %}>Most Episodes</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-2 mb-md-0">
                                <select name="show_mix" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="applyLiveFilter()">
                                    <option value="">All Feeds</option>
                                    {% for mix in current_network.mixes.all %}
                                        <option value="{{ mix.id }}" {% if show_mix == mix.id|stringformat:"s" %}selected{% endif %}>In: {{ mix.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </form>
                        
                        {% include 'pod_manager/snippets/show_multiselect_options_template.html' with podcast_list=network_podcasts field_name='auto_crosspublish_target_ids' %}

                        <div class="accordion accordion-flush" id="showsAccordion">
                            {% include 'pod_manager/creator_tabs/_show_rows.html' %}
                        </div>

                    </div>
                </div>

            <div class="modal fade" id="addShowModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-lg">
                <div class="modal-content bg-dark text-light border-secondary">
                  <div class="modal-header border-bottom border-secondary bg-black">
                    <h5 class="modal-title fw-bold"><i class="bi bi-mic text-warning"></i> Add New Podcast</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                  </div>
                  <form method="POST" action="{% url 'creator_settings' %}?network={{ current_network.slug }}&tab=shows">
                      <div class="modal-body p-4">
                          {% csrf_token %}
                          <input type="hidden" name="action" value="add_show">
                          <input type="hidden" name="network_id" value="{{ current_network.id }}">
                          
                          <div class="mb-3">
                              <label class="form-label text-muted small fw-bold">Adding to Network</label>
                              <input type="text" class="form-control bg-dark text-muted border-secondary" value="{{ current_network.name }}" disabled>
                          </div>
                          
                          <div class="row">
                              <div class="col-md-6 mb-3">
                                  <label class="form-label text-muted small fw-bold">Show Title</label>
                                  <input type="text" name="title" class="form-control bg-black text-light border-secondary" required placeholder="e.g., Prestige">
                              </div>
                              <div class="col-md-6 mb-3">
                                  <label class="form-label text-muted small fw-bold">Slug</label>
                                  <input type="text" name="slug" class="form-control bg-black text-light border-secondary" required placeholder="e.g., prestige">
                                  <div class="form-text text-muted">URL-friendly name. No spaces.</div>
                              </div>
                          </div>
                          
                          <div class="mb-3">
                              <label class="form-label text-muted small fw-bold">Required Tier</label>
                              <select name="tier_id" class="form-select bg-black text-light border-secondary">
                                  <option value="">Public / Free</option>
                                  {% for tier in current_network.tiers.all %}
                                      <option value="{{ tier.id }}">${{ tier.minimum_dollars|floatformat:2 }} - {{ tier.name }}</option>
                                  {% endfor %}
                              </select>
                          </div>
                          
                          <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Public Feed RSS URL</label>
                            <input type="url" name="public_feed_url" class="form-control bg-dark text-light border-secondary" value="{{ show.public_feed_url|default_if_none:'' }}" placeholder="https://... (Leave blank if Premium-Only)">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Subscriber Feed URL (Base)</label>
                            <input type="url" name="subscriber_feed_url" class="form-control bg-dark text-light border-secondary" value="{{ show.subscriber_feed_url|default_if_none:'' }}" placeholder="https://... (Leave blank if Public-Only)">
                        </div>
                          
                      </div>
                      <div class="modal-footer border-top border-secondary">
                        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning fw-bold"><i class="bi bi-plus-circle"></i> Create Show</button>
                      </div>
                  </form>
                </div>
              </div>
            </div>
{% endif %}
