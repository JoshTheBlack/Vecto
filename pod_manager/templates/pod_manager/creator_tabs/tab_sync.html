            <div class="tab-pane fade" id="list-sync" role="tabpanel">
                <div class="card bg-dark border-secondary mt-4">
                    <div class="card-body">
                        <h5 class="text-warning mb-3">Patreon Sync</h5>
                        <p class="text-muted small">If webhooks are missed, you can manually force a full refresh of your patron list and their pledge levels.</p>
                        <form method="POST">
                            {% csrf_token %}
                            <input type="hidden" name="action" value="run_manual_sync">
                            <input type="hidden" name="network_id" value="{{ current_network.id }}">
                            <button type="submit" class="btn btn-outline-warning fw-bold">
                                <i class="bi bi-cloud-arrow-down"></i> Run Manual Sync
                            </button>
                        </form>
                    </div>
                </div>
            </div>
