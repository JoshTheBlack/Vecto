<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: {{ theme.bg_color|default:"#121212" }}; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background-color: {{ theme.surface_bg_color|default:"#1e1e1e" }}; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header { background-color: {{ theme.primary_color|default:"#ffc107" }}; padding: 20px; text-align: center; }
        .header h2 { margin: 0; color: {{ theme.primary_text_color|default:"#000000" }}; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
        .content { padding: 30px; text-align: center; color: {{ theme.surface_text_color|default:"#f8f9fa" }}; }
        .otp-box { background-color: {{ theme.bg_color|default:"#121212" }}; border: 2px dashed {{ theme.border_color|default:"#343a40" }}; border-radius: 8px; margin: 25px 0; padding: 20px; font-size: 36px; font-weight: bold; letter-spacing: 8px; color: {{ theme.primary_color|default:"#ffc107" }}; }
        .footer { background-color: {{ theme.bg_color|default:"#121212" }}; padding: 15px; text-align: center; font-size: 12px; color: {{ theme.bg_muted_text_color|default:"#6c757d" }}; border-top: 1px solid {{ theme.border_color|default:"#343a40" }}; }
        p { line-height: 1.6; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>{{ network_name }} Login</h2>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>Use the following 6-digit code to complete your login. This code will expire in <strong>10 minutes</strong>.</p>
            
            <div class="otp-box">{{ otp_code }}</div>
            
            <p style="font-size: 14px; color: #adb5bd;">If you did not request this code, you can safely ignore this email.</p>
        </div>
        <div class="footer">
            &copy; {% now "Y" %} {{ network_name }}. All rights reserved.
        </div>
    </div>
</body>
</html>
