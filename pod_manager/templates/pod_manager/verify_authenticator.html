{% extends 'pod_manager/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card bg-dark border-secondary shadow">
                <div class="card-body p-4 text-center">
                    <h3 class="fw-bold mb-3">Set Up Authenticator</h3>
                    <p class="text-muted small mb-4">Scan this QR code with Google Authenticator, Authy, or your device's built-in password manager.</p>
                    
                    <div class="bg-white p-2 rounded d-inline-block mb-3">
                        <img src="{{ qr_data_uri }}" alt="Authenticator QR Code" style="width: 200px; height: 200px;">
                    </div>
                    
                    <div class="mb-4">
                        <a class="text-warning small text-decoration-none" data-bs-toggle="collapse" href="#manualSetup" role="button" aria-expanded="false">
                            <i class="bi bi-key-fill me-1"></i> Can't scan the QR code?
                        </a>
                        <div class="collapse mt-2" id="manualSetup">
                            <div class="card card-body bg-dark border-secondary py-2 px-3 text-start">
                                <div class="small text-muted mb-1">Manual Setup Key:</div>
                                <code class="fs-5 text-light fw-bold user-select-all" style="letter-spacing: 1px;">{{ setup_key }}</code>
                            </div>
                        </div>
                    </div>
                    
                    <form method="POST" action="{% url 'verify_authenticator' %}">
                        {% csrf_token %}
                        <input type="hidden" name="device_id" value="{{ device_id }}">
                        
                        <div class="mb-3 text-start">
                            <label class="form-label text-muted small fw-bold">Enter 6-Digit Code to Verify</label>
                            <input type="text" name="code" class="form-control bg-dark text-light border-secondary text-center fs-4" style="letter-spacing: 4px;" placeholder="000000" maxlength="6" autocomplete="off" required autofocus>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success fw-bold py-2">
                                <i class="bi bi-check-circle-fill me-2"></i> Verify and Enable
                            </button>
                            <a href="{% url 'user_profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
